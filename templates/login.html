<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaming Grid - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-4 selection:bg-indigo-500 selection:text-white">

    <div class="w-full max-w-sm">
        <form method="POST" action="/login" class="bg-slate-800 p-8 rounded-2xl border border-slate-700/60 shadow-2xl space-y-5 transition-all duration-200 hover:border-slate-600/80">
            
            <div class="text-center space-y-1.5">
                <h2 class="text-xl font-black font-mono tracking-tight text-indigo-400 uppercase">
                    Skill Game Bar
                </h2>
                <p class="text-xs text-slate-400 font-mono">
                    Login
                </p>
            </div>

            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}
                  <div class="bg-rose-500/10 border border-rose-500/30 p-3 rounded-xl text-xs font-mono text-rose-400">
                      ⚠️ {{ message }}
                  </div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <div class="space-y-4">
                <div class="space-y-1.5">
                    <label for="username" class="text-xs font-bold font-mono text-slate-400 uppercase tracking-wider block">Username</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        required 
                        placeholder="Player ID" 
                        class="w-full bg-slate-950 p-3 rounded-xl border border-slate-700 font-mono text-white text-sm placeholder-slate-600 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all"
                    >
                </div>

                <div class="space-y-1.5">
                    <label for="password" class="text-xs font-bold font-mono text-slate-400 uppercase tracking-wider block">Security Credentials</label>
                    <input 
                        type="password" 
                        id="password"
                        name="password" 
                        required 
                        placeholder="••••••••" 
                        class="w-full bg-slate-950 p-3 rounded-xl border border-slate-700 font-mono text-white text-sm placeholder-slate-600 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all"
                    >
                </div>
            </div>

            <button 
                type="submit" 
                class="w-full bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 py-3 rounded-xl text-sm font-bold tracking-wide text-white transition-all duration-150 shadow-lg shadow-indigo-600/20 transform active:scale-[0.99]"
            >
                Enter Game Bar
            </button>

        </form>

    </div>

</body>
</html>
